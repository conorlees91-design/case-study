              <button onClick={onClose} className="p-1.5 rounded hover:bg-slate-100 text-slate-500"><Icon name="x" className="w-4 h-4"/></button>
            </div>
            <div className="flex-1 overflow-auto scrollbar-thin p-4 space-y-3">
              <div className="rounded-md border border-slate-200 bg-white p-3">
                <ExtractRow label="Payer" value={s.payer} highlight />
                <ExtractRow label="Payer TIN" value={s.payerTin} mono />
                <ExtractRow label="Recipient" value="Chen, Margaret & David (joint)" />
                <ExtractRow label="Account" value={s.account} mono />
              </div>
              <div className="rounded-md border border-slate-200 bg-white p-3">
                <ExtractRow label="Box 1 — Interest income" value={fmt(s.box1)} mono highlight pulled />
                <ExtractRow label="Box 3 — US Treasury obligations" value={fmt(s.box3)} mono />
                <ExtractRow label="Box 4 — Federal income tax withheld" value={fmt(s.fedWithheld)} mono />
                <ExtractRow label="Box 8 — Tax-exempt interest" value={fmt(s.box8)} mono />
              </div>
              <div className="rounded-md border border-slate-200 bg-white p-3 text-[12px]">
                <div className="text-[11px] uppercase tracking-wider text-slate-500 font-semibold mb-2">AI pipeline</div>
                <div className="space-y-1.5">
                  <div className="flex justify-between"><span className="text-slate-600">OCR pass</span><span className="text-emerald-700 font-medium">passed</span></div>
                  <div className="flex justify-between"><span className="text-slate-600">LLM verification</span><span className="text-emerald-700 font-medium">passed</span></div>
                  <div className="flex justify-between"><span className="text-slate-600">Reconciliation</span><span className="text-emerald-700 font-medium">matched</span></div>
                  <div className="flex justify-between"><span className="text-slate-600">Confidence</span><span className="num font-semibold">{pct(s.confidence)}</span></div>
                </div>
              </div>
              {s.flags.length > 0 && (
                <div className="rounded-md border border-amber-200 bg-amber-50 p-3 text-[12px] text-amber-900">
                  <div className="font-semibold mb-1 flex items-center gap-1.5"><Icon name="alert" className="w-3.5 h-3.5"/>Flags on this source</div>
                  <ul className="list-disc pl-4 space-y-0.5">
                    {s.flags.map((f, i) => <li key={i}>{f.label}</li>)}
                  </ul>
                </div>
              )}
              <div className="rounded-md border border-slate-200 bg-slate-50 p-3 text-[11px] text-slate-600">
                <div className="font-semibold text-slate-700 mb-1">Provenance</div>
                <div>Source: {s.source}</div>
                <div>Extracted: <span className="num">{s.extractedAt}</span></div>
                <div>Match: {s.matchedTo}</div>
                <div>SHA256: <span className="num">{s.id.split("-")[1]}f4c2…a91</span></div>
              </div>
            </div>
            <div className="p-3 border-t border-slate-100 flex gap-2">
              <button className="flex-1 text-[12px] font-semibold text-white py-2 rounded-md" style={{ background: "var(--brand)" }}>Accept</button>
              <button className="text-[12px] text-slate-700 px-3 py-2 rounded-md border border-slate-200 hover:bg-slate-50">Override</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ExtractRow({ label, value, mono, highlight, pulled }) {
  return (
    <div className="flex items-center justify-between gap-2 py-1.5 border-b border-slate-100 last:border-0 text-[12px]">
      <div className="text-slate-600 flex items-center gap-1.5">
        {pulled && <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"/>}
        {label}
      </div>
      <div className={`${mono ? "num" : ""} ${highlight ? "font-semibold text-slate-900" : "text-slate-800"} text-right`}>{value}</div>
    </div>
  );
}

   DOCUMENTS VIEW (very simple, supports navigation)

function AnalyticsView({ onJumpTo }) {
  return (
    <div className="p-6 max-w-[1080px] mx-auto fade-in">
      <h1 className="text-[22px] font-semibold text-slate-900">YoY analytics</h1>
      <div className="text-[13px] text-slate-500 mt-1 mb-4">Composite trend across CY {CLIENT.taxYear} vs accepted PY return</div>
      <Panel title="Largest movements">
        <div className="space-y-2">
          {YOY.map(y => (
            <div key={y.lineId} className="flex items-center gap-3 py-1.5">
              <button onClick={() => onJumpTo(y.lineId)} className="text-[13px] text-slate-700 hover:text-slate-900 font-medium w-44 text-left">{y.label}</button>
              <div className="flex-1 h-2 rounded-full bg-slate-100 overflow-hidden relative">
                <div className="absolute inset-y-0 left-0 bg-slate-300" style={{ width: `${(y.py / Math.max(y.cy, y.py)) * 100}%` }} />
                <div className="absolute inset-y-0 left-0" style={{ width: `${(y.cy / Math.max(y.cy, y.py)) * 100}%`, background: y.status === "high" ? "rgba(185,28,28,.6)" : y.status === "med" ? "rgba(180,83,9,.6)" : "rgba(30,64,175,.5)", mixBlendMode: "multiply" }} />
              </div>
              <div className="num text-[12px] text-slate-700 w-28 text-right">{fmt0(y.cy)}</div>
              <div className={`num text-[12px] w-16 text-right ${y.status === "high" ? "text-red-700" : y.status === "med" ? "text-amber-700" : "text-slate-500"}`}>{signedPct(y.pct)}</div>
            </div>
          ))}
        </div>
      </Panel>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [view, setView] = useState("dashboard");
  const [selectedLineId, setSelectedLineId] = useState(null);
  const [openDocId, setOpenDocId] = useState(null);

  const handleJump = (lineId) => {
    setView("form1040");
    setSelectedLineId(lineId);
  };

  return (
    <div className="h-full flex flex-col">
      <TopBar />
      <div className="flex flex-1 overflow-hidden">
        <LeftNav view={view} setView={setView} />
        <main className="flex-1 overflow-auto scrollbar-thin">
          {view === "dashboard" && <Dashboard onJumpTo={handleJump}/>}
          {view === "form1040" && <Form1040 selectedLineId={selectedLineId} onSelectLine={setSelectedLineId} />}
          {view === "docs" && <DocumentsView/>}
          {view === "schedules" && <SchedulesView/>}
          {view === "analytics" && <AnalyticsView onJumpTo={handleJump}/>}
        </main>
        {selectedLineId && view === "form1040" && (
          <LineagePanel
            lineId={selectedLineId}
            onClose={() => setSelectedLineId(null)}
            onOpenDoc={(srcId) => setOpenDocId(srcId)}
          />
        )}
      </div>
      <DocModal sourceId={openDocId} onClose={() => setOpenDocId(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
